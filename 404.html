<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found | Rayford AI</title>
    <link rel="icon" href="/assets/brand/official/rayford-logo-github.png" type="image/png">
    <link rel="stylesheet" href="/assets/styles.css">
    <style>
      .not-found {
        display: flex;
        min-height: calc(100svh - 70px);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 40px 24px;
        text-align: center;
      }

      .not-found h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
      }

      .not-found p {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to main content</a>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Rayford AI home">
        <img class="brand-logo" src="/assets/brand/official/rayford-logo-github.png" alt="Rayford AI">
        <span>Rayford AI</span>
      </a>
    </header>
    <main class="not-found" id="content">
      <p class="eyebrow">404</p>
      <h1>Page not found.</h1>
      <p>The page you are looking for does not exist or has moved.</p>
      <a class="button primary" href="/">Return to Rayford AI</a>
    </main>
  </body>
</html>
